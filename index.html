<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoloEMDR</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#EEF3F2; --bg-soft:#E3ECEA; --ink:#24313A; --ink-soft:#5B6B72;
    --teal:#3E7371; --teal-deep:#2A5654; --clay:#C9825F; --clay-soft:#E7C3AC;
    --line:#C9D6D3; --dusk:#0F1E27; --dusk-2:#16303B;
    --bg-violet:#EFEDF6; --bg-soft-violet:#E5E0EF; --teal-soft:#CFE3E0; --folder-neutral:#D7DEE6;
    --aurora-1:#4C8B88; --aurora-2:#E7A97C; --aurora-3:#B9A6D9; --aurora-4:#7FB0AC;
    --font-display: Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{ background:linear-gradient(120deg,var(--bg) 0%,var(--bg-soft) 50%,var(--bg) 100%); background-size:220% 220%;
    color:var(--ink); font-family:var(--font-body); overflow:hidden; animation:tide 40s ease-in-out infinite; }
  body.phase-positive{ background-image:linear-gradient(120deg,var(--bg-violet) 0%,var(--bg-soft-violet) 50%,var(--bg-violet) 100%); }
  @media (prefers-reduced-motion: reduce){ body{ animation:none; } }
  @keyframes tide{ 0%,100%{background-position:0% 50%;} 50%{background-position:100% 50%;} }
  #app{ height:100vh; width:100vw; position:relative; display:flex; flex-direction:column; }

  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .fs{ opacity:0; animation:fadeIn 0.9s ease forwards; }

  .icon-btn{ position:fixed; top:14px; z-index:60; background:none; border:none; cursor:pointer; opacity:.75; padding:6px; color:var(--ink); }
  .icon-btn:hover{ opacity:1; }
  .icon-btn svg{ display:block; }
  body.stage-dark .icon-btn{ color:#EFE8DA; }
  #homeIcon{ left:14px; }
  #libraryIcon{ left:56px; }
  #settingsIcon{ left:98px; }

  .account-wrap{ position:fixed; top:14px; right:14px; z-index:60; }
  .account-wrap #accountIcon{ position:static; }
  #account-panel{ position:absolute; top:34px; right:-6px; width:220px; background:white; border:1px solid var(--line);
    border-radius:14px; padding:14px; box-shadow:0 10px 30px rgba(0,0,0,.12); display:none; text-align:left; }
  #account-panel.open{ display:block; }
  #account-panel .sub{ margin:0 0 10px; font-size:12.5px; max-width:none; }
  #account-panel button{ width:100%; margin-top:0; }
  #account-panel button + button{ margin-top:8px; }

  #settings-panel{ position:fixed; top:56px; left:98px; z-index:60; width:290px; background:white; border:1px solid var(--line);
    border-radius:14px; padding:16px; box-shadow:0 10px 30px rgba(0,0,0,0.12); display:none; }
  #settings-panel.open{ display:block; }
  #settings-panel h3{ font-size:13px; margin:0 0 10px; }
  .control-group{ margin-bottom:12px; }
  .control-group label{ font-size:12.5px; color:var(--ink-soft); display:block; margin-bottom:4px; }
  select, textarea, input[type=text], input[type=password]{ width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--line);
    font-family:var(--font-body); font-size:13.5px; background:white; color:var(--ink); }
  textarea{ resize:vertical; min-height:70px; }
  input[type=range]{ width:100%; accent-color:var(--teal); }

  .chev{ position:fixed; top:50%; transform:translateY(-50%); z-index:40; background:none; border:none;
    font-size:28px; color:var(--ink-soft); opacity:.28; cursor:pointer; padding:14px; }
  .chev:hover{ opacity:.7; }
  #chevL{ left:2px; } #chevR{ right:2px; }
  body.hide-r #chevR{ display:none; }
  body.hide-l #chevL{ display:none; }

  #stage-wrap{ flex:1; position:relative; overflow:hidden; }
  #stage{ height:100%; width:100%; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:40px; overflow-y:auto; }
  .aurora-wrap{ position:absolute; inset:0; overflow:hidden; z-index:0; pointer-events:none; }
  .aurora-blob{ position:absolute; border-radius:50%; filter:blur(min(9vw,70px)); opacity:.45;
    animation:auroraFloat ease-in-out infinite alternate; }
  @keyframes auroraFloat{ from{ transform:translate(0,0) scale(1) rotate(0deg); } to{ transform:translate(var(--dx,40px), var(--dy,30px)) scale(var(--sc,1.1)) rotate(6deg); } }
  @media (prefers-reduced-motion: reduce){ .aurora-blob{ animation:none; } }
  .home-fg{ position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; }
  #stage h2.instruction{ font-family:var(--font-display); font-weight:600; font-size:clamp(21px,3vw,30px); margin:0 0 6px; max-width:640px; }
  #stage p.sub{ color:var(--ink-soft); font-size:14.5px; margin:0 0 22px; max-width:540px; }

  .breathe-circle{ width:140px; height:140px; border-radius:50%; background:radial-gradient(circle at 35% 35%, var(--clay-soft), var(--teal));
    animation:breathe 6s ease-in-out infinite; margin-bottom:26px; }
  @keyframes breathe{ 0%,100%{transform:scale(0.85);opacity:.85;} 50%{transform:scale(1.05);opacity:1;} }
  @media (prefers-reduced-motion: reduce){ .breathe-circle{ animation:none; } }

  .free-text-wrap{ width:min(560px,90%); margin-top:6px; }
  .free-text-wrap textarea{ min-height:90px; font-size:15px; }
  .check-row{ display:flex; align-items:center; gap:8px; justify-content:center; margin:10px 0 4px; font-size:13.5px; color:var(--ink-soft); }

  .scale-wrap{ width:min(560px,90%); margin-top:6px; }
  .scale-label{ font-family:var(--font-display); font-size:22px; font-weight:600; color:var(--teal-deep); margin:4px 0 14px; min-height:28px; }
  .scale-numbers{ display:flex; gap:7px; justify-content:center; flex-wrap:wrap; }
  .scale-num{ width:38px; height:38px; border-radius:50%; border:1px solid var(--line); background:white; color:var(--ink);
    font-family:var(--font-body); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .scale-num:hover{ border-color:var(--teal); }
  .scale-num.selected{ background:var(--teal); border-color:var(--teal); color:white; }

  .hint-line{ font-size:12.5px; color:var(--ink-soft); margin-top:26px; }

  #bls-stage{ height:100%; width:100%; background:radial-gradient(ellipse at center, var(--dusk-2), var(--dusk)); position:relative; display:none; }
  #bls-inner{ height:100%; width:100%; position:relative; transition:opacity .35s ease; }
  #bls-dot{ position:absolute; width:34px; height:34px; border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%);
    border:1px solid rgba(0,0,0,0.12); }
  #bls-instruction{ position:absolute; top:16%; left:50%; transform:translate(-50%,0); color:#EFE8DA; font-family:var(--font-display);
    font-size:19px; text-align:center; width:80%; max-width:520px; transition:opacity .5s ease; }
  .dark-form{ height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px; }
  .dark-form h2{ font-family:var(--font-display); color:#EFE8DA; font-size:22px; margin:0 0 18px; max-width:560px; }
  .dark-form textarea{ background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.18); color:#EFE8DA; }
  .dark-form textarea::placeholder{ color:rgba(239,232,218,0.4); }
  .dark-form .check-row{ color:rgba(239,232,218,0.6); }

  .countdown-num{ font-family:var(--font-display); font-size:64px; color:var(--teal-deep); }

  /* selection screen */
  #stage.select-view{ align-items:center; overflow:hidden; }
  #stage.select-view h2.instruction{ flex:0 0 auto; width:100%; margin:0 0 20px; }
  .sel-scroll{ flex:1 1 auto; min-height:0; width:100%; overflow-y:auto; display:flex; flex-direction:column; align-items:center; padding-bottom:12px; }
  .sel-list{ width:min(560px,92%); display:flex; flex-direction:column; gap:10px; margin-top:14px; }
  .sel-card{ background:white; border:1px solid var(--line); border-radius:12px; padding:12px 16px; text-align:left; cursor:pointer;
    display:flex; justify-content:space-between; align-items:center; }
  .sel-card:hover{ border-color:var(--teal); }
  .sel-card .t{ font-size:14.5px; font-weight:600; }
  .sel-card .actions{ display:flex; gap:6px; }
  .pill-btn, .sel-card .actions button, .lib-toolbar-actions button, .lib-add-top, #account-panel button{
    font-size:12.5px; padding:7px 14px; border-radius:8px; border:1px solid var(--line); background:var(--bg-soft);
    color:var(--ink); font-family:var(--font-body); cursor:pointer; white-space:nowrap; transition:background-color .15s ease; }
  .pill-btn:hover, .sel-card .actions button:hover, .lib-toolbar-actions button:hover, .lib-add-top:hover, #account-panel button:hover{
    background-color:color-mix(in srgb, var(--bg-soft), black 30%); }
  .sel-alt{ margin-top:18px; font-size:13.5px; color:var(--ink-soft); text-decoration:underline; cursor:pointer; background:none; border:none; }
  .sel-add{ margin-top:6px; font-size:13px; color:var(--teal-deep); background:none; border:none; cursor:pointer; }

  .sel-card.has-status{ display:flex; flex-direction:column; align-items:stretch; }
  .sel-card-top{ display:flex; justify-content:space-between; align-items:center; width:100%; }
  .sel-card-done{ opacity:.5; }

  /* collapsible picker rows: grid-rows trick so height always matches content, never clips */
  .status-picker, .folder-picker{ display:grid; grid-template-rows:0fr; opacity:0; margin-top:0; padding-top:0;
    border-top:1px solid transparent;
    transition:grid-template-rows .25s ease, opacity .2s ease, margin-top .25s ease, padding-top .25s ease, border-color .25s ease; }
  .status-picker.open, .folder-picker.open{ grid-template-rows:1fr; opacity:1; margin-top:10px; padding-top:10px; border-top-color:var(--line); }
  .status-picker > div, .folder-picker > div{ overflow:hidden; min-height:0; display:flex; gap:8px; flex-wrap:wrap; }
  .status-opt{ flex:1; padding:7px 8px; border-radius:8px; border:1px solid var(--line); background:var(--bg-soft);
    color:var(--ink); font-family:var(--font-body); font-size:12.5px; cursor:pointer; }
  .status-opt:hover{ border-color:var(--teal); }
  .status-opt.selected{ background:var(--teal); border-color:var(--teal); color:white; }
  .folder-opt{ padding:6px 10px; border-radius:8px; border:1px solid var(--line); background:var(--bg-soft);
    color:var(--ink); font-family:var(--font-body); font-size:12.5px; cursor:pointer; }
  .folder-opt:hover{ border-color:var(--clay); }
  .folder-opt.selected{ background:var(--clay); border-color:var(--clay); color:white; }

  /* toolbar: search + sort + add actions */
  .lib-toolbar{ width:min(920px,96%); flex:0 0 auto; margin:0 0 26px; display:flex; align-items:center; justify-content:space-between; gap:28px; flex-wrap:wrap; }
  .lib-toolbar input[type=text]{ flex:1 1 240px; max-width:380px; width:auto; font-size:13.5px; padding:8px 16px; border-radius:20px;
    border:1px solid var(--line); background:var(--bg-soft); color:var(--ink); }
  .lib-toolbar input::placeholder{ color:var(--ink-soft); }
  .lib-toolbar input:hover{ border-color:var(--teal); }
  .lib-toolbar input:focus{ outline:none; border-color:var(--teal); background:white; }
  .lib-toolbar-actions{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .toolbar-icon-btn{ background:var(--bg-soft); border:1px solid var(--line); border-radius:8px; padding:8px; cursor:pointer;
    color:var(--ink); display:flex; align-items:center; justify-content:center; transition:background-color .15s ease; }
  .toolbar-icon-btn:hover{ background-color:color-mix(in srgb, var(--bg-soft), black 30%); }
  .toolbar-icon-btn svg{ display:block; }
  .lib-sort-wrap{ position:relative; }
  .lib-sort-panel{ position:absolute; top:44px; left:0; z-index:40; width:210px; background:white; border:1px solid var(--line);
    border-radius:14px; padding:8px; box-shadow:0 10px 30px rgba(0,0,0,.12); display:none; text-align:left; }
  .lib-sort-panel.open{ display:block; }
  .lib-sort-panel button{ display:block; width:100%; text-align:left; padding:8px 10px; border-radius:8px; border:none;
    background:none; color:var(--ink); font-family:var(--font-body); font-size:13px; cursor:pointer; }
  .lib-sort-panel button:hover{ background:var(--bg-soft); }
  .lib-sort-panel button.selected{ font-weight:600; color:var(--teal-deep); }

  .lib-add-top-wrap{ width:min(560px,92%); text-align:left; margin:0 0 12px; }

  /* folder grid */
  .folder-grid{ width:min(920px,96%); display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:14px; margin:0 0 24px; }
  .folder-tile{ position:relative; cursor:pointer; min-height:104px; border-radius:14px; padding:14px; text-align:left;
    background:var(--folder-neutral); display:flex; flex-direction:column; justify-content:flex-start; }
  .folder-tile.all-done{ background:var(--teal-soft); }
  .folder-name{ font-weight:600; font-size:14px; color:var(--ink); word-break:break-word; }
  .folder-count{ font-size:11.5px; color:var(--ink-soft); margin-top:3px; }
  .folder-actions{ position:absolute; bottom:8px; right:8px; display:flex; gap:4px; opacity:0; transition:opacity .15s ease; }
  .folder-tile:hover .folder-actions{ opacity:1; }
  .folder-actions button{ width:24px; height:24px; border-radius:50%; border:1px solid rgba(0,0,0,.08); background:rgba(255,255,255,.75);
    cursor:pointer; font-size:11px; line-height:1; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); }
  .folder-actions button:hover{ background:white; color:var(--ink); }

  .skip-link{ position:fixed; bottom:24px; right:24px; z-index:45; background:none; border:none; color:rgba(239,232,218,0.5);
    font-size:12.5px; cursor:pointer; text-decoration:underline; }
  .skip-link:hover{ color:rgba(239,232,218,0.9); }

  .form-error{ color:#B3423E; font-size:12.5px; margin-top:10px; min-height:16px; max-width:420px; }
</style>
</head>
<body>
<div id="app">
  <button id="homeIcon" class="icon-btn" title="Accueil">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3a3 3 0 00-3 3v1a3 3 0 00-2 2.8V12a3 3 0 002 2.8v1A3 3 0 008 19h1V3H8z"/><path d="M16 3a3 3 0 013 3v1a3 3 0 012 2.8V12a3 3 0 01-2 2.8v1a3 3 0 01-3 3.2h-1V3h1z"/></svg>
  </button>
  <button id="libraryIcon" class="icon-btn" title="Vos souvenirs">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3.5a1 1 0 011-1h10a1 1 0 011 1V20l-6-3.6L6 20V3.5z"/></svg>
  </button>
  <button id="settingsIcon" class="icon-btn" title="Réglages">
    <svg width="20" height="20" viewBox="0 0 20 20"><line x1="2" y1="5" x2="18" y2="5" stroke="currentColor" stroke-width="1.6"/><circle cx="7" cy="5" r="2" fill="currentColor"/><line x1="2" y1="10" x2="18" y2="10" stroke="currentColor" stroke-width="1.6"/><circle cx="13" cy="10" r="2" fill="currentColor"/><line x1="2" y1="15" x2="18" y2="15" stroke="currentColor" stroke-width="1.6"/><circle cx="9" cy="15" r="2" fill="currentColor"/></svg>
  </button>
  <div class="account-wrap">
    <button id="accountIcon" class="icon-btn" title="Compte">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.5-7 8-7s8 3 8 7"/></svg>
    </button>
    <div id="account-panel"></div>
  </div>
  <button class="chev" id="chevL">‹</button>
  <button class="chev" id="chevR">›</button>
  <div id="settings-panel">
    <h3>Réglages de la stimulation</h3>
    <div class="control-group"><label>Vitesse : <span id="speed-val">30</span> passages/min</label><input type="range" id="bls-speed" min="10" max="70" value="30"></div>
    <div class="control-group"><label>Taille du point</label><input type="range" id="bls-size" min="18" max="60" value="34"></div>
    <div class="control-group"><label>Couleur du point</label><input type="color" id="bls-color" value="#F4E3C1" style="width:100%;height:34px;padding:2px;cursor:pointer;"></div>
    <div class="control-group"><label>Durée d'une série : <span id="duration-val">90</span> s</label><input type="range" id="bls-duration" min="20" max="180" value="90"></div>
    <div class="control-group"><label><input type="checkbox" id="bls-audio" checked> Tonalité audio alternée</label></div>
    <div class="control-group"><label><input type="checkbox" id="bls-haptic"> Vibration alternée</label></div>
    <button id="settings-save" class="sel-add" style="width:100%; border:1px solid var(--line); border-radius:8px; padding:8px; margin-top:4px;">Enregistrer</button>
  </div>

  <div id="stage-wrap">
    <div id="stage"></div>
    <div id="bls-stage"><div id="bls-inner"></div></div>
  </div>
</div>

<script>
const LS_TRAUMAS='soloemdr_traumas', LS_SETTINGS='soloemdr_settings', LS_FOLDERS='soloemdr_folders';
const $ = id => document.getElementById(id);
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function loadTraumas(){ try{ return JSON.parse(localStorage.getItem(LS_TRAUMAS))||[]; }catch(e){ return []; } }
function saveTraumas(list){ localStorage.setItem(LS_TRAUMAS, JSON.stringify(list)); scheduleSync(); }
let traumas = loadTraumas();
function loadFolders(){ try{ return JSON.parse(localStorage.getItem(LS_FOLDERS))||[]; }catch(e){ return []; } }
function saveFolders(list){ localStorage.setItem(LS_FOLDERS, JSON.stringify(list)); scheduleSync(); }
let folders = loadFolders();

let settings = { speed:30, size:34, color:'#F4E3C1', duration:90, audio:true, haptic:false };
try{ const s=JSON.parse(localStorage.getItem(LS_SETTINGS)); if(s) settings=Object.assign(settings,s); }catch(e){}
function saveSettings(){ localStorage.setItem(LS_SETTINGS, JSON.stringify(settings)); scheduleSync(); }

/* ==================================================================
   Cloud sync: zero-knowledge encrypted vault (Supabase + Web Crypto)
   The DEK (data encryption key) is generated once per account, then
   wrapped once with a key derived from the password and once with a
   key derived from the recovery phrase. Only the wrapped copies and
   the encrypted vault ever reach the server — the DEK itself, the
   password and the recovery phrase never leave this browser.
   ================================================================== */
const SUPABASE_URL = 'https://fjzvgyjezfhwpnovnrqz.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_TxdbsetLQEMxW6xr6Wxmiw_4Tlbfvlv';
let supa = null;
try{
  if(window.supabase && /^https?:\/\//.test(SUPABASE_URL) && SUPABASE_ANON_KEY && SUPABASE_ANON_KEY.indexOf('HERE')===-1){
    supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
}catch(e){}

const cryptoEnc = new TextEncoder();
const cryptoDec = new TextDecoder();
function b64enc(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function b64dec(str){ return Uint8Array.from(atob(str), c=>c.charCodeAt(0)); }
function randBytes(n){ return crypto.getRandomValues(new Uint8Array(n)); }

async function deriveKekFromPassphrase(passphrase, saltB64){
  const salt = b64dec(saltB64);
  const baseKey = await crypto.subtle.importKey('raw', cryptoEnc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:250000, hash:'SHA-256'},
    baseKey, {name:'AES-GCM', length:256}, true, ['encrypt','decrypt']
  );
}
async function generateDEK(){ return crypto.subtle.generateKey({name:'AES-GCM', length:256}, true, ['encrypt','decrypt']); }
async function wrapDEK(dek, kek){
  const raw = await crypto.subtle.exportKey('raw', dek);
  const iv = randBytes(12);
  const wrapped = await crypto.subtle.encrypt({name:'AES-GCM', iv}, kek, raw);
  return {ivB64:b64enc(iv), wrappedB64:b64enc(wrapped)};
}
async function unwrapDEK(ivB64, wrappedB64, kek){
  const raw = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64dec(ivB64)}, kek, b64dec(wrappedB64));
  return crypto.subtle.importKey('raw', raw, {name:'AES-GCM'}, true, ['encrypt','decrypt']);
}
async function encryptWithDEK(dek, plaintextStr){
  const iv = randBytes(12);
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, dek, cryptoEnc.encode(plaintextStr));
  return {ivB64:b64enc(iv), ctB64:b64enc(ct)};
}
async function decryptWithDEK(dek, ivB64, ctB64){
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64dec(ivB64)}, dek, b64dec(ctB64));
  return cryptoDec.decode(pt);
}
function generateRecoveryPhrase(){
  const alphabet = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const bytes = randBytes(24);
  let out = '';
  for(let i=0;i<bytes.length;i++){ out += alphabet[bytes[i] % alphabet.length]; }
  return out.match(/.{1,4}/g).join('-');
}
function normalizeRecoveryPhrase(s){ return (s||'').toUpperCase().replace(/[^A-Z0-9]/g,''); }

let vault = { dek:null, userId:null, email:null };
const LS_SYNCED = 'soloemdr_synced_before';
function vaultReady(){ return !!(supa && vault.dek && vault.userId); }

let syncTimer = null;
function scheduleSync(){
  if(!vaultReady()) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(vaultPush, 1000);
}
async function vaultPush(){
  if(!vaultReady()) return;
  const payload = JSON.stringify({traumas, folders, settings});
  const {ivB64, ctB64} = await encryptWithDEK(vault.dek, payload);
  await supa.from('vaults').update({data_iv:ivB64, ciphertext:ctB64, updated_at:new Date().toISOString()}).eq('user_id', vault.userId);
}
async function vaultPull(row){
  const json = await decryptWithDEK(vault.dek, row.data_iv, row.ciphertext);
  const parsed = JSON.parse(json);
  traumas = parsed.traumas||[]; folders = parsed.folders||[];
  settings = Object.assign(settings, parsed.settings||{});
  localStorage.setItem(LS_TRAUMAS, JSON.stringify(traumas));
  localStorage.setItem(LS_FOLDERS, JSON.stringify(folders));
  localStorage.setItem(LS_SETTINGS, JSON.stringify(settings));
}

async function ensureVaultCreated(userId, email, password){
  const {data: row} = await supa.from('vaults').select('*').eq('user_id', userId).maybeSingle();
  if(row) return {created:false, row};
  const dek = await generateDEK();
  const saltPw = b64enc(randBytes(16));
  const saltRec = b64enc(randBytes(16));
  const recoveryPhrase = generateRecoveryPhrase();
  const kekPw = await deriveKekFromPassphrase(password, saltPw);
  const kekRec = await deriveKekFromPassphrase(normalizeRecoveryPhrase(recoveryPhrase), saltRec);
  const wrapPw = await wrapDEK(dek, kekPw);
  const wrapRec = await wrapDEK(dek, kekRec);
  const payload = JSON.stringify({traumas, folders, settings});
  const {ivB64, ctB64} = await encryptWithDEK(dek, payload);
  const newRow = { user_id:userId, salt_pw:saltPw, iv_pw:wrapPw.ivB64, wrapped_dek_pw:wrapPw.wrappedB64,
    salt_rec:saltRec, iv_rec:wrapRec.ivB64, wrapped_dek_rec:wrapRec.wrappedB64, data_iv:ivB64, ciphertext:ctB64 };
  const {error: insErr} = await supa.from('vaults').insert(newRow);
  if(insErr) throw insErr;
  vault.dek = dek; vault.userId = userId; vault.email = email;
  localStorage.setItem(LS_SYNCED, '1');
  renderAccountPanel();
  return {created:true, recoveryPhrase, row:newRow};
}

async function vaultSignUp(email, password){
  const {data, error} = await supa.auth.signUp({email, password, options:{emailRedirectTo: location.origin+location.pathname}});
  if(error) throw error;
  if(!data.session) return {needsConfirmation:true};
  const result = await ensureVaultCreated(data.user.id, email, password);
  return {needsConfirmation:false, recoveryPhrase:result.recoveryPhrase};
}

async function vaultLogin(email, password){
  const {data, error} = await supa.auth.signInWithPassword({email, password});
  if(error) throw error;
  const userId = data.user.id;
  const result = await ensureVaultCreated(userId, email, password);
  if(result.created){
    return {conflict:false, freshlyCreated:true, recoveryPhrase:result.recoveryPhrase};
  }
  const row = result.row;
  const kekPw = await deriveKekFromPassphrase(password, row.salt_pw);
  const dek = await unwrapDEK(row.iv_pw, row.wrapped_dek_pw, kekPw);
  vault.dek = dek; vault.userId = userId; vault.email = email;
  renderAccountPanel();
  const hasLocalData = traumas.length>0 || folders.length>0;
  const syncedBefore = localStorage.getItem(LS_SYNCED);
  if(hasLocalData && !syncedBefore){ return {conflict:true, row}; }
  await vaultPull(row);
  localStorage.setItem(LS_SYNCED, '1');
  return {conflict:false};
}

async function completeRecovery(recoveryPhrase, newPassword){
  const {data:{user}} = await supa.auth.getUser();
  if(!user) throw new Error('Session de récupération invalide, redemande un lien.');
  const {data: row, error} = await supa.from('vaults').select('*').eq('user_id', user.id).single();
  if(error) throw error;
  const kekRec = await deriveKekFromPassphrase(normalizeRecoveryPhrase(recoveryPhrase), row.salt_rec);
  let dek;
  try{ dek = await unwrapDEK(row.iv_rec, row.wrapped_dek_rec, kekRec); }
  catch(e){ throw new Error('Phrase de récupération incorrecte.'); }
  const {error: updErr} = await supa.auth.updateUser({password:newPassword});
  if(updErr) throw updErr;
  const saltPw = b64enc(randBytes(16));
  const kekPw = await deriveKekFromPassphrase(newPassword, saltPw);
  const wrapPw = await wrapDEK(dek, kekPw);
  const {error: updRowErr} = await supa.from('vaults').update({salt_pw:saltPw, iv_pw:wrapPw.ivB64, wrapped_dek_pw:wrapPw.wrappedB64}).eq('user_id', user.id);
  if(updRowErr) throw updRowErr;
  vault.dek = dek; vault.userId = user.id; vault.email = user.email;
  renderAccountPanel();
  await vaultPull(row);
  localStorage.setItem(LS_SYNCED, '1');
}

}

let session=null, currentPhase=null, history=[];
let forwardAction=null, spaceAction=null;

function goTo(phase, fn){
  if(currentPhase!==null){ history.push({phase:currentPhase, snap:JSON.parse(JSON.stringify(session||{})), fn:currentFn}); }
  currentPhase = phase; currentFn = fn;
  document.body.classList.remove('hide-r','hide-l');
  forwardAction=null; spaceAction=null;
  window.history.pushState({soloemdrNav:true}, '', location.href);
  fn();
}
let currentFn = null;
function goBack(){
  if(!history.length) return;
  const h = history.pop();
  session = h.snap; currentPhase = h.phase; currentFn = h.fn;
  document.body.classList.remove('hide-r','hide-l');
  forwardAction=null; spaceAction=null;
  h.fn();
}
document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowLeft'){ e.preventDefault(); goBack(); }
  else if(e.key==='ArrowRight'||e.key==='Enter'){ e.preventDefault(); if(forwardAction) forwardAction(); }
  else if(e.code==='Space'){ if(spaceAction){ e.preventDefault(); spaceAction(); } }
});
$('chevL').addEventListener('click',goBack);
$('chevR').addEventListener('click',()=>{ if(forwardAction) forwardAction(); });

const LS_LIBSORT = 'soloemdr_libsort';
let libSortMode = localStorage.getItem(LS_LIBSORT) || 'alpha';
const SORT_OPTIONS = [
  {value:'alpha', label:'Alphabétique'},
  {value:'created', label:'Date de création'},
  {value:'modified', label:'Date de modification'},
  {value:'count', label:'Nombre de souvenirs'},
  {value:'status', label:'Statut'},
  {value:'color', label:'Couleur'},
];
const STATUS_ORDER = {a_traiter:0, en_cours:1, traite:2};

function hexToHue(hex){
  if(!hex) return -1;
  const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max-min;
  if(d===0) return 0;
  let h;
  if(max===r) h = ((g-b)/d) % 6;
  else if(max===g) h = (b-r)/d + 2;
  else h = (r-g)/d + 4;
  h *= 60;
  return h<0 ? h+360 : h;
}

function sortFolders(list, mode){
  const arr = [...list];
  if(mode==='alpha') arr.sort((a,b)=> a.name.localeCompare(b.name));
  else if(mode==='created') arr.sort((a,b)=> (b.createdAt||0) - (a.createdAt||0));
  else if(mode==='modified') arr.sort((a,b)=> (b.updatedAt||b.createdAt||0) - (a.updatedAt||a.createdAt||0));
  else if(mode==='count') arr.sort((a,b)=> traumas.filter(t=>t.folderId===b.id).length - traumas.filter(t=>t.folderId===a.id).length);
  else if(mode==='color') arr.sort((a,b)=> hexToHue(a.color) - hexToHue(b.color));
  else if(mode==='status'){
    arr.sort((a,b)=> a.name.localeCompare(b.name));
    const isDone = f=>{ const items = traumas.filter(t=>t.folderId===f.id); return items.length>0 && items.every(t=>t.status==='traite'); };
    arr.sort((a,b)=> (isDone(a)?1:0) - (isDone(b)?1:0));
  }
  return arr;
}
function sortTraumas(list, mode){
  const arr = [...list];
  if(mode==='alpha') arr.sort((a,b)=> a.title.localeCompare(b.title));
  else if(mode==='created') arr.sort((a,b)=> (b.createdAt||0) - (a.createdAt||0));
  else if(mode==='modified') arr.sort((a,b)=> (b.updatedAt||b.createdAt||0) - (a.updatedAt||a.createdAt||0));
  else if(mode==='status') arr.sort((a,b)=> (STATUS_ORDER[a.status]??0) - (STATUS_ORDER[b.status]??0));
  if(mode!=='status'){ arr.sort((a,b)=> (a.status==='traite'?1:0) - (b.status==='traite'?1:0)); }
  return arr;
}

function bucketLabelPresence(v){
  if(v<=1) return 'Pas du tout';
  if(v<=3) return 'Un peu';
  if(v<=5) return 'Bof, moyennement';
  if(v<=7) return 'Plutôt oui';
  if(v<=9) return 'Beaucoup';
  return 'Totalement';
}
function bucketLabelValence(v){
  if(v<=1) return 'Très mal';
  if(v<=3) return 'Mal';
  if(v<=5) return 'Plutôt mal';
  if(v<=7) return 'Plutôt bien';
  if(v<=9) return 'Bien';

}

function renderScaleScreen(title, storeKey, detailKey, nextPhase, nextFn, showDetail){
  const s = stageBase();
  const labelFn = storeKey==='level2' ? bucketLabelPresence : bucketLabelValence;
  const numbersHtml = Array.from({length:10},(_,i)=>i+1).map(n=>`<button class="scale-num" data-v="${n}">${n}</button>`).join('');
  s.innerHTML = `
    <h2 class="instruction fs">${title}</h2>
    <div class="scale-wrap fs" style="animation-delay:.9s">
      <div class="scale-label" id="sl-label"></div>
      <div class="scale-numbers" id="sl-numbers">${numbersHtml}</div>
      ${showDetail!==false ? `<div class="free-text-wrap" style="width:100%; margin-top:16px;"><textarea id="sl-detail" placeholder="Vous pouvez préciser si vous voulez (facultatif).">${session[detailKey]||''}</textarea></div>` : ''}
    </div>
  `;
  let touched = session[storeKey]!=null;
  let currentValue = touched ? session[storeKey] : null;
  const buttons = s.querySelectorAll('.scale-num');
  function selectValue(v){
    buttons.forEach(b=> b.classList.toggle('selected', +b.dataset.v===v));
    s.querySelector('#sl-label').textContent = labelFn(v);
  }
  if(touched) selectValue(currentValue);
  buttons.forEach(b=> b.addEventListener('click', ()=>{
    touched = true; currentValue = +b.dataset.v;
    selectValue(currentValue);
  }));
  forwardAction = ()=>{
    session[storeKey] = touched ? currentValue : null;
    if(showDetail!==false){ session[detailKey] = s.querySelector('#sl-detail').value; }
    goTo(nextPhase, nextFn);
  };
}

let bls = { running:false, mode:null, accumulated:0, resumeTime:0, lastSide:null, anim:null, timer:null, audioCtx:null };

function computeXY(t){
  const swing=Math.sin(t*Math.PI*2);
  return {x:0.5+swing*0.42, y:0.5};
}
function playTick(side){
  if(!settings.audio) return;
  try{
    if(!bls.audioCtx) bls.audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const ctx=bls.audioCtx, osc=ctx.createOscillator(), gain=ctx.createGain(), pan=ctx.createStereoPanner();
    osc.type='sine'; osc.frequency.value=420; pan.pan.value=side==='L'?-1:1;
    const now=ctx.currentTime;
    gain.gain.setValueAtTime(0,now); gain.gain.linearRampToValueAtTime(0.18,now+0.012); gain.gain.exponentialRampToValueAtTime(0.0001,now+0.11);
    osc.connect(gain).connect(pan).connect(ctx.destination); osc.start(now); osc.stop(now+0.13);
  }catch(e){}
}

function showBall(mode, resp){
  document.body.classList.add('hide-l','hide-r','stage-dark');
  $('stage').style.display='none'; $('bls-stage').style.display='block';
  const inner = $('bls-inner');
  const isFirst = resp === undefined;
  const txt = mode==='neg' ? 'Plongez dans le souvenir.' : mode==='pos' ? 'Plongez dans le souvenir en restant sur cette fréquence.' : mode==='bodyscan' ? 'Scannez votre corps.' : 'Suivez le point des yeux.';
  const count = mode==='neg' ? session.negSets : mode==='pos' ? session.posSets : 1;
  inner.innerHTML = `
    ${isFirst ? `<div id="bls-instruction">${txt}</div>` : ''}
    <div id="bls-dot"></div>
    ${count>=1 && mode!=='bodyscan' && mode!=='simple' ? `<button class="skip-link" id="skip-link">passer</button>` : ''}
  `;
  const dot = $('bls-dot');
  dot.style.width=settings.size+'px'; dot.style.height=settings.size+'px'; dot.style.background=settings.color;
  const skipBtn = $('skip-link');
  if(skipBtn) skipBtn.addEventListener('click', ()=>{
    if(mode==='neg') goTo('reconnect_pos', ()=>renderReconnect('pos'));
    else if(mode==='pos') goTo('bodyscan', renderBodyScan);
  });
  spaceAction = ()=> startBLS(mode);
}

function startBLS(mode){
  spaceAction = ()=> requestStop();
  bls.mode=mode; bls.running=true; bls.accumulated=0; bls.resumeTime=performance.now(); bls.lastSide=null;
  if(mode==='neg') session.negSets++; else if(mode==='pos') session.posSets++;
  const ins = $('bls-instruction'); if(ins) ins.style.opacity='0';
  bls.timer = setTimeout(()=> requestStop(), settings.duration*1000);
  runLoop();
}

function runLoop(){
  const dot=$('bls-dot'); const bstage=$('bls-stage');
  const speed=settings.speed, periodMs=60000/speed;
  function frame(now){
    if(!bls.running) return;
    const elapsed = bls.accumulated + (now-bls.resumeTime);
    const t = (elapsed%periodMs)/periodMs;
    const {x,y} = computeXY(t);
    const w=bstage.clientWidth, h=bstage.clientHeight;
    dot.style.left=(x*w)+'px'; dot.style.top=(y*h)+'px';
    const side = x<0.5?'L':'R';
    if(side!==bls.lastSide){
      if(bls.lastSide!==null){ playTick(side); if(settings.haptic && navigator.vibrate) navigator.vibrate(25); }
      bls.lastSide=side;
    }
    bls.anim = requestAnimationFrame(frame);
  }
  bls.anim = requestAnimationFrame(frame);
}

function requestStop(){
  if(!bls.running) return;
  bls.running=false; spaceAction=null;
  if(bls.timer) clearTimeout(bls.timer);
  if(bls.anim) cancelAnimationFrame(bls.anim);
  const dot=$('bls-dot'), bstage=$('bls-stage');
  const startLeft=parseFloat(dot.style.left)||bstage.clientWidth/2, startTop=parseFloat(dot.style.top)||bstage.clientHeight/2;
  const cx=bstage.clientWidth/2, cy=bstage.clientHeight/2, dur=1200, t0=performance.now();
  function decel(now){
    let p=Math.min(1,(now-t0)/dur); const ease=1-Math.pow(1-p,3);
    dot.style.left=(startLeft+(cx-startLeft)*ease)+'px'; dot.style.top=(startTop+(cy-startTop)*ease)+'px';
    if(p<1) requestAnimationFrame(decel); else afterStop();
  }
  requestAnimationFrame(decel);
}

function afterStop(){
  const mode = bls.mode;
  if(mode==='bodyscan'){ $('bls-stage').style.display='none'; $('stage').style.display='flex'; document.body.classList.remove('hide-l','hide-r'); renderBodyScan(); return; }
  if(mode==='simple'){ showBall('simple'); return; }
  crossfadeToForm(mode);
}

function crossfadeToForm(mode){
  const inner = $('bls-inner');

  setTimeout(()=>{
    inner.innerHTML = `
      <div class="dark-form">

      </div>`;
    inner.style.opacity=1;
    document.body.classList.add('hide-l','hide-r');
    function proceedResponse(nothing){
      const count = mode==='neg' ? session.negSets : session.posSets;
      forwardAction=null;
      if(count % 5 === 0){ showCheckpointDark(mode); }
      else { showStayOn(mode, nothing); }
    }
    forwardAction = ()=> proceedResponse($('resp-nothing').checked);
    $('resp-nothing').addEventListener('change', (e)=>{ if(e.target.checked) proceedResponse(true); });
  },350);
}

    const t = traumas.find(x=>x.id===session.traumaId);
    if(t){
      s.querySelector('#status-row').innerHTML = `
        <button class="sel-add" data-status="en_cours">Marquer : en cours</button>
        <button class="sel-add" data-status="traite">Marquer : traité</button>`;
      s.querySelectorAll('[data-status]').forEach(b=> b.addEventListener('click',()=>{
        t.status=b.dataset.status; saveTraumas(traumas);
        s.querySelector('#status-row').innerHTML = '<p class="sub">Statut mis à jour.</p>';
      }));
    }
  }
  setTimeout(()=>{ session=null; history=[]; currentPhase=null; goTo('loading0final', ()=> renderLoading({phase:'home',fn:renderHome})); }, 6000);
}

/* ---------------- account / sync screens ---------------- */
function renderAccountPanel(){
  const panel = $('account-panel');
  if(!supa){
    panel.innerHTML = `<p class="sub">Synchronisation non configurée.</p>`;
    return;
  }
  if(vault.userId){
    panel.innerHTML = `
      <p class="sub">Connecté·e : ${escapeHtml(vault.email)}</p>
      <button id="acc-panel-logout">Se déconnecter</button>
    `;
    panel.querySelector('#acc-panel-logout').addEventListener('click', ()=>{
      vaultLogout();
      panel.classList.remove('open');
      if(currentFn) currentFn();
    });
  } else {
    panel.innerHTML = `<button id="acc-panel-login">Se connecter</button>`;
    panel.querySelector('#acc-panel-login').addEventListener('click', ()=>{
      panel.classList.remove('open');
      goTo('authlogin', ()=> renderAuthForm('login'));
    });
  }
}

function renderAuthForm(mode){
  const s = stageBase();
  const isSignup = mode==='signup';
  s.innerHTML = `
    <h2 class="instruction fs">${isSignup ? 'Créer un compte' : 'Se connecter'}</h2>
    <div class="free-text-wrap fs" style="animation-delay:.3s"><input type="text" id="auth-email" placeholder="Email"></div>
    <div class="free-text-wrap fs" style="animation-delay:.4s"><input type="password" id="auth-pw" placeholder="Mot de passe"></div>
    <p class="form-error" id="auth-error"></p>
    <button class="pill-btn fs" id="auth-submit" style="animation-delay:.5s;">${isSignup ? 'Créer mon compte' : 'Se connecter'}</button>
    ${!isSignup ? `
      <button class="sel-alt fs" id="auth-forgot" style="animation-delay:.6s;">Mot de passe oublié ?</button>
      <button class="sel-alt fs" id="auth-toggle-signup" style="animation-delay:.65s;">Pas de compte ? Créer un compte</button>
    ` : `
      <button class="sel-alt fs" id="auth-toggle-login" style="animation-delay:.6s;">Déjà un compte ? Se connecter</button>
    `}
  `;
  document.body.classList.add('hide-r');
  const errEl = s.querySelector('#auth-error');
  const submit = async ()=>{
    const email = s.querySelector('#auth-email').value.trim();
    const password = s.querySelector('#auth-pw').value;
    if(!email || !password){ errEl.textContent = 'Email et mot de passe requis.'; return; }
    errEl.textContent = 'Un instant...';
    try{
      if(isSignup){
        const res = await vaultSignUp(email, password);
        if(res.needsConfirmation){
          s.innerHTML = `<h2 class="instruction fs">Vérifie ta boîte mail</h2><p class="sub fs" style="animation-delay:.3s">Clique sur le lien de confirmation reçu par email, puis reviens te connecter.</p>`;
          return;
        }
        goTo('recoveryreveal', ()=> renderRecoveryPhraseReveal(res.recoveryPhrase, 'home', renderHome));
      } else {
        const res = await vaultLogin(email, password);
        if(res.conflict){
          goTo('syncchoice', ()=> renderSyncChoice(res.row));
        } else if(res.freshlyCreated){
          goTo('recoveryreveal', ()=> renderRecoveryPhraseReveal(res.recoveryPhrase, 'home', renderHome));
        } else {
          session=null; history=[]; currentPhase=null;
          goTo('home', renderHome);
        }
      }
    }catch(e){
      errEl.textContent = translateAuthError(e);
    }
  };
  s.querySelector('#auth-submit').addEventListener('click', submit);
  forwardAction = submit;
  if(!isSignup){
    s.querySelector('#auth-forgot').addEventListener('click', ()=> goTo('forgotpw', renderForgotPassword));
    s.querySelector('#auth-toggle-signup').addEventListener('click', ()=> goTo('authsignup', ()=> renderAuthForm('signup')));
  } else {
    s.querySelector('#auth-toggle-login').addEventListener('click', ()=> goTo('authlogin', ()=> renderAuthForm('login')));
  }
}

function renderRecoveryPhraseReveal(phrase, returnPhase, returnFn){
  const s = stageBase();
  s.innerHTML = `
    <h2 class="instruction fs">Ta phrase de récupération</h2>
    <p class="sub fs" style="animation-delay:.3s">Note-la maintenant dans un endroit sûr (gestionnaire de mots de passe, papier...). Elle ne sera plus jamais affichée. Sans elle et sans ton mot de passe, tes souvenirs seraient perdus définitivement.</p>
    <div class="fs" style="animation-delay:.4s; font-family:monospace; font-size:17px; letter-spacing:1px; background:white; border:1px solid var(--line);
      border-radius:12px; padding:16px 20px; margin:8px auto 0; width:min(420px,90%); word-break:break-all;">${escapeHtml(phrase)}</div>
    <div class="check-row fs" style="animation-delay:.6s"><input type="checkbox" id="phrase-ack"> <label for="phrase-ack">J'ai noté ma phrase de récupération en lieu sûr</label></div>
    <button class="sel-add fs" id="phrase-continue" style="animation-delay:.7s; opacity:.4;">Continuer</button>
  `;
  document.body.classList.add('hide-l','hide-r');
  const ack = s.querySelector('#phrase-ack');
  const btn = s.querySelector('#phrase-continue');
  ack.addEventListener('change', ()=>{ btn.style.opacity = ack.checked ? '1' : '.4'; });
  const proceed = ()=>{
    if(!ack.checked) return;
    session=null; history=[]; currentPhase=null;
    goTo(returnPhase, returnFn);
  };
  btn.addEventListener('click', proceed);
}

function renderForgotPassword(){
  const s = stageBase();
  s.innerHTML = `
    <h2 class="instruction fs">Mot de passe oublié</h2>
    <p class="sub fs" style="animation-delay:.3s">On t'envoie un lien par email pour choisir un nouveau mot de passe. Tu auras ensuite besoin de ta phrase de récupération pour redéchiffrer tes souvenirs.</p>
    <div class="free-text-wrap fs" style="animation-delay:.4s"><input type="text" id="forgot-email" placeholder="Email"></div>
    <p class="form-error" id="forgot-error"></p>
    <button class="sel-add fs" id="forgot-submit" style="animation-delay:.5s;">Envoyer le lien</button>
  `;
  document.body.classList.add('hide-r');
  const errEl = s.querySelector('#forgot-error');
  const submit = async ()=>{
    const email = s.querySelector('#forgot-email').value.trim();
    if(!email){ errEl.textContent = 'Email requis.'; return; }
    errEl.textContent = 'Envoi...';
    try{
      await requestPasswordReset(email);
      s.innerHTML = `<h2 class="instruction fs">Vérifie ta boîte mail</h2><p class="sub fs" style="animation-delay:.3s">Clique sur le lien reçu par email pour choisir un nouveau mot de passe.</p>`;
    }catch(e){ errEl.textContent = translateAuthError(e); }
  };
  s.querySelector('#forgot-submit').addEventListener('click', submit);
  forwardAction = submit;
}

function renderSetNewPasswordAfterRecovery(){
  const s = stageBase();
  s.innerHTML = `
    <h2 class="instruction fs">Choisir un nouveau mot de passe</h2>
    <p class="sub fs" style="animation-delay:.3s">Entre ta phrase de récupération pour redéchiffrer tes souvenirs, et le nouveau mot de passe que tu veux utiliser.</p>
    <div class="free-text-wrap fs" style="animation-delay:.4s"><input type="text" id="rec-phrase" placeholder="Phrase de récupération"></div>
    <div class="free-text-wrap fs" style="animation-delay:.5s"><input type="password" id="rec-newpw" placeholder="Nouveau mot de passe"></div>
    <p class="form-error" id="rec-error"></p>
    <button class="sel-add fs" id="rec-submit" style="animation-delay:.6s;">Valider</button>
  `;
  document.body.classList.add('hide-l','hide-r');
  const errEl = s.querySelector('#rec-error');
  const submit = async ()=>{
    const phrase = s.querySelector('#rec-phrase').value.trim();
    const newPw = s.querySelector('#rec-newpw').value;
    if(!phrase || !newPw){ errEl.textContent = 'Les deux champs sont requis.'; return; }
    errEl.textContent = 'Un instant...';
    try{
      await completeRecovery(phrase, newPw);
      session=null; history=[]; currentPhase=null;
      goTo('home', renderHome);
    }catch(e){ errEl.textContent = translateAuthError(e); }
  };
  s.querySelector('#rec-submit').addEventListener('click', submit);
  forwardAction = submit;
}

function renderSyncChoice(row){
  const s = stageBase();
  s.innerHTML = `
    <h2 class="instruction fs">Des souvenirs existent aux deux endroits</h2>
    <p class="sub fs" style="animation-delay:.3s">Cet appareil a déjà des souvenirs en local, et ton compte en a aussi. Lequel veux-tu garder ? L'autre sera remplacé.</p>
    <div class="fs" style="animation-delay:.5s; display:flex; gap:12px; justify-content:center; margin-top:10px;">
      <button class="sel-add" id="sync-local">Garder ceux de cet appareil</button>
      <button class="sel-add" id="sync-cloud">Garder ceux du compte</button>
    </div>
  `;
  document.body.classList.add('hide-l','hide-r');
  s.querySelector('#sync-local').addEventListener('click', async ()=>{
    await vaultResolveKeepLocal();
    session=null; history=[]; currentPhase=null;
    goTo('home', renderHome);
  });
  s.querySelector('#sync-cloud').addEventListener('click', async ()=>{
    await vaultResolveUseCloud(row);
    session=null; history=[]; currentPhase=null;
    goTo('home', renderHome);
  });
}

/* boot */
goTo('loading0', ()=> renderLoading({phase:'home', fn:renderHome}));
function renderPhase(phase){ }
</script>
</body>
</html>
